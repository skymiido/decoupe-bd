<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✂️ Découpe Auto BD</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #252538;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        h1 { color: #f5c2e7; margin-bottom: 25px; }
        input[type="file"] { display: none; }
        .btn {
            display: inline-block;
            background-color: #89b4fa;
            color: #11111b;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #b4befe; }
        #status { margin: 15px 0; color: #a6e3a1; font-weight: bold; }
        
        /* Style de la zone de réglage */
        .reglage-box {
            background: #181825;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid #45475a;
        }
        .slider {
            width: 85%;
            margin-top: 10px;
            accent-color: #f5c2e7;
        }

        #resultats {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }
        .case-img {
            max-width: 100%;
            border: 3px solid #f5c2e7;
            border-radius: 8px;
        }
    </style>
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
</head>
<body>

<div class="container">
    <h1>✂️ Découpeur Auto Mobile</h1>
    
    <div id="status">Chargement de l'intelligence de découpe... ⏳</div>

    <div class="reglage-box">
        <label for="seuilSlider" style="font-weight: bold; display: block;">🎛️ Seuil de Détection : <span id="seuilValeur" style="color: #f5c2e7;">220</span></label>
        <input type="range" id="seuilSlider" class="slider" min="100" max="250" value="220">
        <small style="display: block; color: #a6adc8; margin-top: 5px;">Baisse si des cases manquent. Augmente s'il y a de fausses cases.</small>
    </div>
    
    <label for="fileInput" class="btn">📱 Choisir une image de BD</label>
    <input type="file" id="fileInput" accept="image/*">
    
    <div id="resultats"></div>
</div>

<canvas id="canvasIn" style="display:none;"></canvas>

<script>
    let cvReady = false;
    let imageChargee = null;

    // Quand OpenCV.js a fini de charger
    function onOpenCvReady() {
        document.getElementById('status').innerText = "Prêt ! Sélectionne une image pour commencer. ✅";
        cvReady = true;
    }

    // Réagir en temps réel au changement du curseur
    document.getElementById('seuilSlider').addEventListener('input', function(e) {
        document.getElementById('seuilValeur').innerText = e.target.value;
        if (imageChargee) {
            document.getElementById('status').innerText = "Recalcul en cours... ⏳";
            // Un micro-délai pour laisser le slider fluide sur téléphone
            setTimeout(() => { traiterImage(imageChargee); }, 50);
        }
    });

    document.getElementById('fileInput').addEventListener('change', function(e) {
        if (!cvReady) {
            alert("L'application charge encore, attends une seconde !");
            return;
        }

        let file = e.target.files[0];
        if (!file) return;

        document.getElementById('status').innerText = "Découpe en cours... ⏳";

        let reader = new FileReader();
        reader.onload = function(event) {
            imageChargee = new Image();
            imageChargee.onload = function() {
                traiterImage(imageChargee);
            }
            imageChargee.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    function traiterImage(imgBlanche) {
        let canvas = document.getElementById('canvasIn');
        let ctx = canvas.getContext('2d');
        canvas.width = imgBlanche.width;
        canvas.height = imgBlanche.height;
        ctx.drawImage(imgBlanche, 0, 0);

        let src = cv.imread(canvas);
        let gray = new cv.Mat();
        let thresh = new cv.Mat();
        let contours = new cv.MatVector();
        let hierarchy = new cv.Mat();

        // Conversion en niveaux de gris et flou léger
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
        let ksize = new cv.Size(5, 5);
        cv.GaussianBlur(gray, gray, ksize, 0, 0, cv.BORDER_DEFAULT);

        // Récupération de la valeur du curseur pour ajuster le contraste des lignes
        let valeurSeuil = parseInt(document.getElementById('seuilSlider').value);
        cv.threshold(gray, thresh, valeurSeuil, 255, cv.THRESH_BINARY_INV);

        // Détection des contours
        cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

        let compteur = 0;
        let resultatsDiv = document.getElementById('resultats');
        resultatsDiv.innerHTML = ""; // Vider l'écran

        // Parcours du haut vers le bas
        for (let i = contours.size() - 1; i >= 0; --i) {
            let cnt = contours.get(i);
            let rect = cv.boundingRect(cnt);

            // Filtre de taille réduit à 80px pour capturer même les petites cases (mangas inclus)
            if (rect.width > 80 && rect.height > 80) {
                compteur++;

                let canvasCase = document.createElement('canvas');
                canvasCase.width = rect.width;
                canvasCase.height = rect.height;
                let ctxCase = canvasCase.getContext('2d');

                // Crop de la case
                ctxCase.drawImage(canvas, rect.x, rect.y, rect.width, rect.height, 0, 0, rect.width, rect.height);

                let imgCase = new Image();
                imgCase.src = canvasCase.toDataURL("image/png");
                imgCase.className = "case-img";

                let conteneurCase = document.createElement('div');
                conteneurCase.appendChild(imgCase);
                
                let btnSauvegarder = document.createElement('a');
                btnSauvegarder.href = imgCase.src;
                btnSauvegarder.download = `case_${compteur}.png`;
                btnSauvegarder.innerText = `⬇️ Enregistrer la Case ${compteur}`;
                btnSauvegarder.className = "btn";
                btnSauvegarder.style.marginTop = "5px";
                btnSauvegarder.style.backgroundColor = "#a6e3a1";

                conteneurCase.appendChild(document.createElement('br'));
                conteneurCase.appendChild(btnSauvegarder);
                resultatsDiv.appendChild(conteneurCase);
            }
        }

        document.getElementById('status').innerText = `🎉 Terminé ! ${compteur} cases détectées.`;

        // Nettoyage complet des données OpenCV en mémoire
        src.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete();
    }
</script>

</body>
</html>
