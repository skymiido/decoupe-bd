<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✂️ Découpeur Expert BD</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a24;
            color: #e2e8f0;
            text-align: center;
            padding: 15px;
            margin: 0;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: #222232;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        h1 { color: #f472b6; margin-bottom: 20px; font-size: 24px; }
        input[type="file"] { display: none; }
        .btn {
            display: inline-block;
            background-color: #60a5fa;
            color: #0f172a;
            padding: 14px 28px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
            transition: 0.2s;
            font-size: 16px;
        }
        .btn:hover { background-color: #93c5fd; }
        #status { margin: 15px 0; color: #34d399; font-weight: bold; font-size: 14px; }
        
        .reglage-box {
            background: #151522;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            border: 1px solid #334155;
            text-align: left;
        }
        .reglage-ligne {
            margin-bottom: 12px;
        }
        .reglage-ligne:last-child { margin-bottom: 0; }
        
        label { font-size: 13px; font-weight: bold; display: block; margin-bottom: 4px; }
        .slider {
            width: 100%;
            accent-color: #f472b6;
            margin-top: 4px;
        }
        .valeur-accent { color: #f472b6; font-weight: bold; }

        #resultats {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 25px;
        }
        .case-wrapper {
            background: #1e1e2f;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #3b3b4f;
        }
        .case-img {
            max-width: 100%;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
    <!-- Chargement d'OpenCV.js -->
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
</head>
<body>

<div class="container">
    <h1>✂️ Découpeur Expert BD</h1>
    
    <div id="status">Chargement de l'intelligence OpenCV... ⏳</div>

    <!-- Panneau de contrôle avancé pour les hors-cadres -->
    <div class="reglage-box">
        <div class="reglage-ligne">
            <label for="seuilSlider">🎛️ 1. Tolérance couleur (Page vs Dessin) : <span id="seuilValeur" class="valeur-accent">210</span></label>
            <input type="range" id="seuilSlider" class="slider" min="100" max="245" value="210">
        </div>
        <div class="reglage-ligne">
            <label for="dilatSlider">🦸‍♂️ 2. Extension Hors-Cadre (Prendre ce qui dépasse) : +<span id="dilatValeur" class="valeur-accent">12</span> px</label>
            <input type="range" id="dilatSlider" class="slider" min="2" max="35" value="12">
        </div>
    </div>
    
    <label for="fileInput" class="btn">📸 Sélectionner la page de BD</label>
    <input type="file" id="fileInput" accept="image/*">
    
    <div id="resultats"></div>
</div>

<canvas id="canvasIn" style="display:none;"></canvas>

<script>
    let cvReady = false;
    let imageChargee = null;
    let roulementCalcul = false;

    function onOpenCvReady() {
        document.getElementById('status').innerText = "Prêt ! Intègre une page pour tester. ✅";
        cvReady = true;
    }

    // Relancer la découpe en direct quand on bouge les curseurs
    function declencherRecalcul() {
        if (!imageChargee || roulementCalcul) return;
        roulementCalcul = true;
        document.getElementById('status').innerText = "Ajustement intelligent... ⏳";
        
        setTimeout(() => {
            traiterImage(imageChargee);
            roulementCalcul = false;
            document.getElementById('status').innerText = "Ajusté ! ✅";
        }, 60);
    }

    document.getElementById('seuilSlider').addEventListener('input', function(e) {
        document.getElementById('seuilValeur').innerText = e.target.value;
        declencherRecalcul();
    });

    document.getElementById('dilatSlider').addEventListener('input', function(e) {
        document.getElementById('dilatValeur').innerText = e.target.value;
        declencherRecalcul();
    });

    document.getElementById('fileInput').addEventListener('change', function(e) {
        if (!cvReady) return;
        let file = e.target.files[0];
        if (!file) return;

        document.getElementById('status').innerText = "Analyse de la structure de la page... ⏳";

        let reader = new FileReader();
        reader.onload = function(event) {
            imageChargee = new Image();
            imageChargee.onload = function() {
                traiterImage(imageChargee);
            }
            imageChargee.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    function traiterImage(imgBlanche) {
        let canvas = document.getElementById('canvasIn');
        let ctx = canvas.getContext('2d');
        canvas.width = imgBlanche.width;
        canvas.height = imgBlanche.height;
        ctx.drawImage(imgBlanche, 0, 0);

        let src = cv.imread(canvas);
        let gray = new cv.Mat();
        let thresh = new cv.Mat();
        let dialated = new cv.Mat();
        let contours = new cv.MatVector();
        let hierarchy = new cv.Mat();

        // 1. Passage en gris et flou anti-bruit
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
        let ksize = new cv.Size(3, 3);
        cv.GaussianBlur(gray, gray, ksize, 0, 0, cv.BORDER_DEFAULT);

        // 2. Seuillage pour isoler l'encre noire (cases + personnages)
        let valeurSeuil = parseInt(document.getElementById('seuilSlider').value);
        cv.threshold(gray, thresh, valeurSeuil, 255, cv.THRESH_BINARY_INV);

        // 3. LA MAGIE : Dilatation (On épaissit les traits pour souder les membres qui dépassent à leur case)
        let dilatTaille = parseInt(document.getElementById('dilatSlider').value);
        let M = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(dilatTaille, dilatTaille));
        cv.dilate(thresh, dialated, M, new cv.Point(-1, -1), 1, cv.BORDER_CONSTANT, cv.morphologyDefaultBorderValue());

        // 4. Recherche des blocs fusionnés
        cv.findContours(dialated, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

        let resultatsDiv = document.getElementById('resultats');
        resultatsDiv.innerHTML = ""; 
        let compteur = 0;

        // Tri des contours du haut vers le bas de l'image
        let listeContours = [];
        for (let i = 0; i < contours.size(); ++i) {
            let cnt = contours.get(i);
            let rect = cv.boundingRect(cnt);
            // Ignorer les éléments trop minuscules (bulles isolées, petits textes)
            if (rect.width > 70 && rect.height > 70) {
                listeContours.push({ rect: rect, index: i });
            }
        }
        
        // Trier par coordonnée Y (haut en bas), puis X (gauche à droite)
        listeContours.sort((a, b) => {
            if (Math.abs(a.rect.y - b.rect.y) < 40) {
                return a.rect.x - b.rect.x;
            }
            return a.rect.y - b.rect.y;
        });

        // 5. Extraction des cases ajustées
        listeContours.forEach((item) => {
            compteur++;
            let rect = item.rect;

            // Ajout d'une petite marge de sécurité tout autour pour ne pas frôler le dessin
            let marge = 6;
            let x = Math.max(0, rect.x - marge);
            let y = Math.max(0, rect.y - marge);
            let w = Math.min(canvas.width - x, rect.width + (marge * 2));
            let h = Math.min(canvas.height - y, rect.height + (marge * 2));

            let canvasCase = document.createElement('canvas');
            canvasCase.width = w;
            canvasCase.height = h;
            let ctxCase = canvasCase.getContext('2d');

            // Découpe finale sur l'image d'origine propre
            ctxCase.drawImage(canvas, x, y, w, h, 0, 0, w, h);

            let imgCase = new Image();
            imgCase.src = canvasCase.toDataURL("image/png");
            imgCase.className = "case-img";

            let wrapper = document.createElement('div');
            wrapper.className = "case-wrapper";
            
            let titreCase = document.createElement('div');
            titreCase.style.marginBottom = "8px";
            titreCase.style.fontSize = "14px";
            titreCase.style.fontWeight = "bold";
            titreCase.innerText = `Case N°${compteur}`;
            
            let btnSauvegarder = document.createElement('a');
            btnSauvegarder.href = imgCase.src;
            btnSauvegarder.download = `case_${compteur}.png`;
            btnSauvegarder.innerText = `⬇️ Sauvegarder la Case`;
            btnSauvegarder.className = "btn";
            btnSauvegarder.style.margin = "10px 0 0 0";
            btnSauvegarder.style.backgroundColor = "#34d399";
            btnSauvegarder.style.width = "90%";

            wrapper.appendChild(titreCase);
            wrapper.appendChild(imgCase);
            wrapper.appendChild(btnSauvegarder);
            resultatsDiv.appendChild(wrapper);
        });

        document.getElementById('status').innerText = `🎉 Analyse réussie : ${compteur} cases extraites !`;

        // Nettoyage complet
        src.delete(); gray.delete(); thresh.delete(); dialated.delete(); contours.delete(); hierarchy.delete(); M.delete();
    }
</script>

</body>
</html>
